server {
    listen 80;
    server_name _;

    client_max_body_size 10m;
    add_header Content-Security-Policy "default-src * data: blob: 'unsafe-inline' 'unsafe-eval';" always;
    resolver 127.0.0.11 ipv6=off valid=30s;

    # Health probe endpoint for gateway itself.
    location = /gateway-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Nginx status endpoint for Prometheus nginx-exporter.
    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;
        access_log off;
    }

    # API traffic with rate limiting and proxy headers.
    location / {
    limit_req zone=api_by_ip burst=40 nodelay;
    set $api_upstream http://api:8000;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    proxy_buffering off;
    proxy_request_buffering off;
    chunked_transfer_encoding off;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_pass $api_upstream;
}
}

