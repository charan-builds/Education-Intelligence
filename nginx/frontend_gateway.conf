server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=30s;
    set $landing_upstream http://landing:80;
    set $frontend_app_upstream http://frontend_app:3000;

    location = / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter '/assets/' '/premium-assets/';
        sub_filter '</body>' '<script src="/route-bridge.js"></script></body>';
        proxy_pass $landing_upstream;
    }

    location /premium-assets/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $landing_upstream/assets/;
    }

    location = /route-bridge.js {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $landing_upstream/route-bridge.js;
    }

    location ~ ^/assets/(?:index-|ProductJourney-|StorytellingSection-|BentoShowcase-|FeaturesSection-|LiveMetricsSection-|DashboardPreviewSection-|TestimonialsSection-|PricingSection-|FinalCTA-|ParallaxSection-|AreaChart-|rocket-|target-|circle-check-|clock-|award-|users-|shield-|star-).+\.(?:js|css)$ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $landing_upstream;
    }

    location /assets/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $frontend_app_upstream;
    }

    location = /favicon.ico {
        return 302 /icon.svg;
    }

    location = /icon.svg {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $frontend_app_upstream;
    }

    location /_next/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $frontend_app_upstream;
    }

    location ~ ^/(auth|login|register|dashboard|diagnostic|roadmap|community|student|teacher|mentor|admin|super-admin|independent-learner)(/.*)?$ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $frontend_app_upstream;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass $landing_upstream;
    }
}
