apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: learning-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/learning-platform-api:latest
          imagePullPolicy: IfNotPresent
          command: ["./scripts/start_api.sh"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: learning-platform-config
            - secretRef:
                name: learning-platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: learning-platform
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
