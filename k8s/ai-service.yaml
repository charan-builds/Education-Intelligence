apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: learning-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/your-org/learning-platform-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
          envFrom:
            - configMapRef:
                name: learning-platform-config
            - secretRef:
                name: learning-platform-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: learning-platform
spec:
  selector:
    app: ai-service
  ports:
    - name: http
      port: 8100
      targetPort: 8100
