apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
  namespace: learning-platform
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: db-backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  pg_dump "$DATABASE_URL" | gzip > /backup/learning-platform-$(date +%F).sql.gz
              envFrom:
                - secretRef:
                    name: learning-platform-secrets
              volumeMounts:
                - name: backup
                  mountPath: /backup
          volumes:
            - name: backup
              emptyDir: {}
