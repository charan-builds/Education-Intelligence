apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: learning-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/your-org/learning-platform-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.infrastructure.jobs.celery_app:celery_app", "worker", "--loglevel=info", "--pool=solo"]
          envFrom:
            - configMapRef:
                name: learning-platform-config
            - secretRef:
                name: learning-platform-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: learning-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: celery-beat
          image: ghcr.io/your-org/learning-platform-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "app.infrastructure.jobs.celery_app:celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: learning-platform-config
            - secretRef:
                name: learning-platform-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
