name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/learning-platform-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/learning-platform-frontend
  AI_IMAGE: ghcr.io/${{ github.repository_owner }}/learning-platform-ai-service

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: learning-platform-frontend/package-lock.json

      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Compile backend
        run: python -m compileall app

      - name: Install frontend
        working-directory: learning-platform-frontend
        run: npm ci

      - name: Build frontend
        working-directory: learning-platform-frontend
        run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: api_meta
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/metadata-action@v5
        id: frontend_meta
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/metadata-action@v5
        id: ai_meta
        with:
          images: ${{ env.AI_IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.api_meta.outputs.tags }}
          labels: ${{ steps.api_meta.outputs.labels }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: learning-platform-frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ai_service/Dockerfile
          push: true
          tags: ${{ steps.ai_meta.outputs.tags }}
          labels: ${{ steps.ai_meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set kube context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Render image tags
        run: |
          sed -i "s|ghcr.io/your-org/learning-platform-api:latest|${API_IMAGE}:sha-${GITHUB_SHA::7}|g" k8s/api.yaml k8s/workers.yaml
          sed -i "s|ghcr.io/your-org/learning-platform-frontend:latest|${FRONTEND_IMAGE}:sha-${GITHUB_SHA::7}|g" k8s/frontend.yaml
          sed -i "s|ghcr.io/your-org/learning-platform-ai-service:latest|${AI_IMAGE}:sha-${GITHUB_SHA::7}|g" k8s/ai-service.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/api.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl apply -f k8s/ai-service.yaml
          kubectl apply -f k8s/workers.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/network-policy.yaml
          kubectl apply -f k8s/cronjobs.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api -n learning-platform --timeout=180s
          kubectl rollout status deployment/frontend -n learning-platform --timeout=180s
          kubectl rollout status deployment/ai-service -n learning-platform --timeout=180s
