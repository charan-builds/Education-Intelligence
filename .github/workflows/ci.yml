name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run backend smoke and regression tests
        run: |
          pytest -q \
            tests/test_auth_email_delivery.py \
            tests/test_auth_tenant_isolation.py \
            tests/test_analytics_routes.py \
            tests/test_file_routes.py \
            tests/test_file_storage_service.py \
            tests/test_mentor_routes.py \
            tests/test_notification_routes.py \
            tests/test_roadmap_generation.py \
            tests/test_tenant_context_dependencies.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: learning-platform-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: learning-platform-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend unit tests
        run: npm run test:run

      - name: Build frontend
        run: npm run build
