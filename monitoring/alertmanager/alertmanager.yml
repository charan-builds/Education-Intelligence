global:
  resolve_timeout: 5m

route:
  receiver: default-log
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-log

# Example webhook receiver:
#  - name: team-webhook
#    webhook_configs:
#      - url: http://your-webhook-endpoint

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "service"]
